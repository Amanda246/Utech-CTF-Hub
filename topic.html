<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Topic - UTech CTF Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="custom.css">
</head>
<body class="bg-dark text-light">
<div id="nav-placeholder"></div>
<div class="container mt-3" id="alert-container"></div>

<main class="container py-4" id="main-content">
  <div class="text-center py-5 text-muted">Loading...</div>
</main>

<footer class="bg-black text-center py-3 border-top border-success mt-auto">
  <p class="text-muted mb-0"><i class="bi bi-shield-lock"></i> UTech CTF Hub | CNS3005 Ethical Hacking | <span class="text-success">&copy; 2026</span></p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="data.js"></script>
<script src="auth.js"></script>
<script src="app.js"></script>
<script>
  initPage();

  const slug = getQueryParam('slug');
  const topic = TOPICS.find(t => t.slug === slug);

  if (!topic) {
    document.getElementById('main-content').innerHTML = '<div class="alert alert-danger">Topic not found.</div>';
  } else {
    document.title = topic.title + ' - UTech CTF Hub';
    document.getElementById('main-content').innerHTML = `
      <a href="learn.html" class="btn btn-outline-secondary btn-sm mb-3"><i class="bi bi-arrow-left"></i> Back to Learn</a>
      <h2 class="text-info">${topic.title}</h2>
      ${topic.category ? `<span class="badge bg-secondary mb-3">${topic.category}</span>` : ''}
      <div class="card bg-dark border-secondary mt-2">
        <div class="card-body">${topic.content}</div>
      </div>`;
  }
</script>
</body>
</html>
