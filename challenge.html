<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Challenge - UTech CTF Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-dark text-light">
<div id="nav-placeholder"></div>
<div class="container mt-3" id="alert-container"></div>

<main class="container py-4" id="main-content">
  <div class="text-center py-5 text-muted">Loading...</div>
</main>

<footer class="bg-black text-center py-3 border-top border-success mt-auto">
  <p class="text-muted mb-0"><i class="bi bi-shield-lock"></i> UTech CTF Hub | CNS3005 Ethical Hacking | <span class="text-success">&copy; 2026</span></p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
  initPage();

  const slug = getQueryParam('slug');
  const challenge = getChallenges().find(c => c.slug === slug);

  if (!challenge) {
    document.getElementById('main-content').innerHTML = '<div class="alert alert-danger">Challenge not found.</div>';
  } else {
    document.title = challenge.title + ' - UTech CTF Hub';

    // Require login
    if (!requireLogin(window.location.href)) {
      // redirecting...
    } else {
      renderChallengePage();
    }
  }

  function getSolveCount() {
    return getSolves().filter(s => s.challengeId === challenge.id).length;
  }

  function renderChallengePage() {
    const session = getSession();
    const solve = getSolveForUser(session.userId, challenge.id);
    const isSolved = !!solve;

    let solveSection = '';
    if (isSolved) {
      const learnedSection = challenge.whatYouLearned
        ? `<div class="card bg-dark border-info mb-3">
             <div class="card-body">
               <h6 class="text-info"><i class="bi bi-lightbulb-fill"></i> What You Learned</h6>
               <p class="text-light mb-1">${challenge.whatYouLearned}</p>
               ${challenge.defense ? `<h6 class="text-success mt-2"><i class="bi bi-shield-check"></i> Defense</h6><p class="text-light mb-0">${challenge.defense}</p>` : ''}
             </div>
           </div>` : '';
      solveSection = `
        <div class="alert alert-success d-flex justify-content-between align-items-center">
          <span><i class="bi bi-check-circle-fill"></i> <strong>Solved!</strong> You already completed this challenge.</span>
          <button class="btn btn-outline-warning btn-sm" onclick="redoChallenge()">
            <i class="bi bi-arrow-clockwise"></i> Redo Challenge
          </button>
        </div>
        ${learnedSection}`;
    } else {
      solveSection = `
        <div class="card bg-dark border-success">
          <div class="card-body">
            <h5 class="text-success mb-3"><i class="bi bi-flag-fill"></i> Submit Flag</h5>
            <div class="input-group">
              <input type="text" id="flag-input" class="form-control bg-black text-success border-success flag-input"
                     placeholder="FLAG{...}" autocomplete="off">
              <button class="btn btn-success" onclick="submitFlag()">Submit</button>
            </div>
            <div id="hint-section" class="mt-3"></div>
          </div>
        </div>`;
    }

    document.getElementById('main-content').innerHTML = `
      <a href="challenges.html" class="btn btn-outline-secondary btn-sm mb-3"><i class="bi bi-arrow-left"></i> Back</a>
      <div class="row">
        <div class="col-md-8">
          <div class="card bg-dark border-secondary mb-4">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-start mb-3">
                <h3 class="text-light">${challenge.title}</h3>
                <span class="badge bg-success fs-6">${challenge.points} pts</span>
              </div>
              <div class="mb-3">
                <span class="badge bg-info text-dark">${challenge.category}</span>
                ${difficultyBadge(challenge.difficulty)}
              </div>
              <hr class="border-secondary">
              <div class="text-light">${challenge.description}</div>
              ${challenge.hint ? `
              <div class="mt-3">
                <button class="btn btn-outline-warning btn-sm" id="hint-btn" onclick="toggleHint()">
                  <i class="bi bi-lightbulb"></i> Show Hint (-${challenge.hintPenalty} pts)
                </button>
                <div id="hint-text" class="alert alert-warning mt-2 d-none">${challenge.hint}</div>
              </div>` : ''}
            </div>
          </div>
          ${solveSection}
        </div>
        <div class="col-md-4">
          <div class="card bg-dark border-secondary">
            <div class="card-body">
              <h6 class="text-muted text-uppercase">Challenge Info</h6>
              <hr class="border-secondary">
              <p class="mb-1 text-muted small">Solves: <span class="text-light" id="solve-count">${getSolveCount()}</span></p>
              <p class="mb-1 text-muted small">Points: <span class="text-success">${challenge.points}</span></p>
              <p class="mb-0 text-muted small">Category: <span class="text-info">${challenge.category}</span></p>
            </div>
          </div>
        </div>
      </div>`;
  }

  let hintUsed = false;
  function toggleHint() {
    const hintText = document.getElementById('hint-text');
    const hintBtn = document.getElementById('hint-btn');
    if (hintText.classList.contains('d-none')) {
      hintText.classList.remove('d-none');
      hintBtn.textContent = 'Hide Hint';
      hintUsed = true;
    } else {
      hintText.classList.add('d-none');
      hintBtn.innerHTML = `<i class="bi bi-lightbulb"></i> Show Hint (-${challenge.hintPenalty} pts)`;
    }
  }

  function submitFlag() {
    const session = getSession();
    const input = document.getElementById('flag-input');
    const submitted = input.value.trim();

    if (!submitted) return;

    const existing = getSolveForUser(session.userId, challenge.id);
    if (existing) { showAlert('You already solved this challenge!', 'info'); return; }

    if (submitted === challenge.flag) {
      let points = challenge.points;
      if (hintUsed) points -= challenge.hintPenalty;
      addSolve(session.userId, challenge.id, points, hintUsed);
      updateUserPoints(session.userId, points);
      showAlert(`Correct! +${points} points!`, 'success');
      setTimeout(() => renderChallengePage(), 800);
    } else {
      showAlert('Incorrect flag. Try again.', 'danger');
      input.value = '';
    }
  }

  function redoChallenge() {
    if (!confirm('Reset your solve? Your points for this challenge will be removed.')) return;
    const session = getSession();
    const solve = getSolveForUser(session.userId, challenge.id);
    if (solve) {
      updateUserPoints(session.userId, -solve.pointsAwarded);
      removeSolve(session.userId, challenge.id);
      showAlert('Challenge reset! You can attempt it again.', 'info');
      setTimeout(() => renderChallengePage(), 800);
    }
  }

  // Allow Enter key to submit flag
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && document.getElementById('flag-input') === document.activeElement) {
      submitFlag();
    }
  });
</script>
</body>
</html>
