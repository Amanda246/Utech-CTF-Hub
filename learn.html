<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn - UTech CTF Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-dark text-light">
<div id="nav-placeholder"></div>
<div class="container mt-3" id="alert-container"></div>

<main class="container py-4">
  <h2 class="mb-1"><i class="bi bi-book"></i> Learn</h2>
  <p class="text-muted mb-4">Study these topics before attempting the challenges.</p>
  <div class="row" id="topics-grid"></div>
</main>

<footer class="bg-black text-center py-3 border-top border-success mt-auto">
  <p class="text-muted mb-0"><i class="bi bi-shield-lock"></i> UTech CTF Hub | CNS3005 Ethical Hacking | <span class="text-success">&copy; 2026</span></p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
  initPage();

  document.getElementById('topics-grid').innerHTML = TOPICS.map(topic => {
    const preview = topic.content.replace(/<[^>]+>/g, '').substring(0, 120) + '...';
    return `
      <div class="col-md-4 mb-4">
        <div class="card topic-card h-100">
          <div class="card-body d-flex flex-column">
            <h5 class="text-info"><i class="bi bi-journal-code"></i> ${topic.title}</h5>
            ${topic.category ? `<span class="badge bg-secondary mb-2">${topic.category}</span>` : ''}
            <p class="text-muted small flex-grow-1">${preview}</p>
            <a href="topic.html?slug=${topic.slug}" class="btn btn-outline-info btn-sm mt-auto">Read More</a>
          </div>
        </div>
      </div>`;
  }).join('');
</script>
</body>
</html>
