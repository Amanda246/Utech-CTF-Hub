<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - UTech CTF Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../css/custom.css">
</head>
<body class="bg-dark text-light">
<div id="nav-placeholder"></div>
<div class="container mt-3" id="alert-container"></div>

<main class="container py-4">
  <h2 class="text-warning mb-4"><i class="bi bi-gear-fill"></i> Admin Dashboard</h2>

  <div class="row mb-4" id="stats-row"></div>

  <!-- Challenges heading + action buttons -->
  <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <h4 class="text-light mb-0">Challenges</h4>
    <div class="d-flex gap-2 flex-wrap">
      <button class="btn btn-outline-secondary btn-sm" onclick="confirmRestore()">
        <i class="bi bi-arrow-counterclockwise"></i> Restore Defaults
      </button>
      <button class="btn btn-success btn-sm" onclick="openModal()">
        <i class="bi bi-plus-circle"></i> Add Challenge
      </button>
    </div>
  </div>

  <div class="table-responsive mb-5">
    <table class="table table-dark table-hover align-middle">
      <thead>
        <tr>
          <th>Title</th><th>Category</th><th>Difficulty</th>
          <th>Points</th><th>Solves</th><th>Status</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="challenges-tbody"></tbody>
    </table>
  </div>

  <h4 class="text-light mb-3">Registered Users</h4>
  <div class="table-responsive">
    <table class="table table-dark table-hover">
      <thead>
        <tr><th>Username</th><th>Email</th><th>Role</th><th>Points</th><th>Joined</th><th>Actions</th></tr>
      </thead>
      <tbody id="users-tbody"></tbody>
    </table>
  </div>
</main>

<!-- ── Add / Edit Modal ───────────────────────────────────────────────────── -->
<div class="modal fade" id="challengeModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content bg-dark border-success">
      <div class="modal-header border-secondary">
        <h5 class="modal-title text-success" id="modal-title">Add Challenge</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-id">
        <div class="row">
          <div class="col-md-8 mb-3">
            <label class="form-label text-muted">Title <span class="text-danger">*</span></label>
            <input type="text" id="f-title" class="form-control bg-black text-light border-secondary">
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label text-muted">Points <span class="text-danger">*</span></label>
            <input type="number" id="f-points" class="form-control bg-black text-light border-secondary" min="1">
          </div>
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label text-muted">Category <span class="text-danger">*</span></label>
            <select id="f-category" class="form-select bg-black text-light border-secondary">
              <option value="">Select...</option>
              <option>Web Hacking</option>
              <option>Cryptography</option>
              <option>Network Security</option>
              <option>Reverse Engineering</option>
              <option>Social Engineering</option>
              <option>Data Security</option>
            </select>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label text-muted">Difficulty <span class="text-danger">*</span></label>
            <select id="f-difficulty" class="form-select bg-black text-light border-secondary">
              <option value="">Select...</option>
              <option>Beginner</option>
              <option>Intermediate</option>
              <option>Advanced</option>
            </select>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label text-muted">Description <span class="text-danger">*</span> <small>(HTML allowed)</small></label>
          <textarea id="f-description" class="form-control bg-black text-light border-secondary" rows="5"></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label text-muted">Flag <span class="text-danger">*</span> <small>(e.g. FLAG{your_flag})</small></label>
          <input type="text" id="f-flag" class="form-control bg-black text-success border-secondary flag-input" placeholder="FLAG{...}">
        </div>
        <div class="row">
          <div class="col-md-9 mb-3">
            <label class="form-label text-muted">Hint <small>(optional)</small></label>
            <input type="text" id="f-hint" class="form-control bg-black text-light border-secondary">
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label text-muted">Hint Penalty (pts)</label>
            <input type="number" id="f-hint-penalty" class="form-control bg-black text-light border-secondary" value="10" min="0">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label text-muted">What You Learned <small>(shown after solving)</small></label>
          <textarea id="f-learned" class="form-control bg-black text-light border-secondary" rows="2"></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label text-muted">Defense / Prevention</label>
          <textarea id="f-defense" class="form-control bg-black text-light border-secondary" rows="2"></textarea>
        </div>
      </div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-success" onclick="saveChallenge()">
          <i class="bi bi-check-lg"></i> Save Challenge
        </button>
      </div>
    </div>
  </div>
</div>

<footer class="bg-black text-center py-3 border-top border-success mt-auto">
  <p class="text-muted mb-0">
    <i class="bi bi-shield-lock"></i> UTech CTF Hub | CNS3005 Ethical Hacking |
    <span class="text-success">&copy; 2026</span>
  </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/data.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/app.js"></script>
<script>
  initPage();
  if (!requireAdmin()) { throw new Error('Not authorized'); }

  let modal;
  document.addEventListener('DOMContentLoaded', () => {
    modal = new bootstrap.Modal(document.getElementById('challengeModal'));
  });

  // ── Render ──────────────────────────────────────────────────────────────────

  function render() {
    const challenges = getChallenges();   // always reads from data.js + overlay
    const users   = getUsers();
    const solves  = getSolves();

    // Stats
    document.getElementById('stats-row').innerHTML = `
      <div class="col-md-3 mb-3">
        <div class="card bg-dark border-warning text-center p-3">
          <h3 class="text-warning">${challenges.length}</h3>
          <p class="text-muted mb-0">Challenges</p>
        </div>
      </div>
      <div class="col-md-3 mb-3">
        <div class="card bg-dark border-info text-center p-3">
          <h3 class="text-info">${users.length}</h3>
          <p class="text-muted mb-0">Users</p>
        </div>
      </div>
      <div class="col-md-3 mb-3">
        <div class="card bg-dark border-success text-center p-3">
          <h3 class="text-success">${solves.length}</h3>
          <p class="text-muted mb-0">Total Solves</p>
        </div>
      </div>
      <div class="col-md-3 mb-3">
        <div class="card bg-dark border-danger text-center p-3 btn" onclick="confirmResetScoreboard()">
          <h3 class="text-danger"><i class="bi bi-arrow-counterclockwise"></i></h3>
          <p class="text-muted mb-0">Reset Scoreboard</p>
        </div>
      </div>`;

    // Challenges table — admin sees ALL including hidden ones
    document.getElementById('challenges-tbody').innerHTML = challenges.length
      ? challenges.map(ch => {
          const solveCount = solves.filter(s => s.challengeId === ch.id).length;
          const active = ch.isEnabled !== false;
          return `
          <tr class="${active ? '' : 'opacity-50'}">
            <td>${ch.title}</td>
            <td><span class="badge bg-info text-dark">${ch.category}</span></td>
            <td>${difficultyBadge(ch.difficulty)}</td>
            <td class="text-success">${ch.points}</td>
            <td>${solveCount}</td>
            <td>
              <span class="badge ${active ? 'bg-success' : 'bg-secondary'}">
                ${active ? 'Active' : 'Hidden'}
              </span>
            </td>
            <td class="text-nowrap">
              <button class="btn btn-outline-warning btn-sm me-1"
                      onclick="openModal(${ch.id})" title="Edit">
                <i class="bi bi-pencil"></i> Edit
              </button>
              <button class="btn btn-outline-${active ? 'secondary' : 'success'} btn-sm me-1"
                      onclick="doToggle(${ch.id})"
                      title="${active ? 'Hide from students' : 'Show to students'}">
                <i class="bi bi-eye${active ? '-slash' : ''}"></i>
                ${active ? 'Hide' : 'Show'}
              </button>
              <button class="btn btn-outline-danger btn-sm"
                      onclick="doDelete(${ch.id}, '${ch.title.replace(/'/g, "\\'")}')"
                      title="Delete permanently">
                <i class="bi bi-trash"></i> Delete
              </button>
            </td>
          </tr>`;
        }).join('')
      : '<tr><td colspan="7" class="text-muted text-center">No challenges.</td></tr>';

    // Users table
    const currentSession = getSession();
    document.getElementById('users-tbody').innerHTML = users.map(u => {
      const isSelf = currentSession && u.id === currentSession.userId;
      const isAdmin = u.role === 'admin';
      const deleteBtn = (!isAdmin && !isSelf)
        ? `<button class="btn btn-outline-danger btn-sm" onclick="doDeleteUser(${u.id}, '${u.username.replace(/'/g, "\\'")}')">
             <i class="bi bi-trash"></i> Delete
           </button>`
        : `<span class="text-muted small">${isSelf ? '(you)' : 'admin'}</span>`;
      return `
      <tr>
        <td>${u.username}</td>
        <td>${u.email}</td>
        <td><span class="badge ${isAdmin ? 'bg-warning text-dark' : 'bg-secondary'}">${u.role}</span></td>
        <td class="text-success">${u.totalPoints || 0}</td>
        <td class="text-muted small">${new Date(u.createdAt).toLocaleDateString()}</td>
        <td>${deleteBtn}</td>
      </tr>`;
    }).join('');
  }

  // ── Modal ───────────────────────────────────────────────────────────────────

  function openModal(id) {
    document.getElementById('edit-id').value       = '';
    document.getElementById('f-title').value       = '';
    document.getElementById('f-points').value      = '';
    document.getElementById('f-category').value    = '';
    document.getElementById('f-difficulty').value  = '';
    document.getElementById('f-description').value = '';
    document.getElementById('f-flag').value        = '';
    document.getElementById('f-hint').value        = '';
    document.getElementById('f-hint-penalty').value = 10;
    document.getElementById('f-learned').value     = '';
    document.getElementById('f-defense').value     = '';
    document.getElementById('modal-title').textContent = 'Add Challenge';

    if (id) {
      const ch = getChallenges().find(c => c.id === id);
      if (!ch) return;
      document.getElementById('modal-title').textContent  = 'Edit Challenge';
      document.getElementById('edit-id').value            = ch.id;
      document.getElementById('f-title').value            = ch.title;
      document.getElementById('f-points').value           = ch.points;
      document.getElementById('f-category').value         = ch.category;
      document.getElementById('f-difficulty').value       = ch.difficulty;
      document.getElementById('f-description').value      = ch.description;
      document.getElementById('f-flag').value             = ch.flag;
      document.getElementById('f-hint').value             = ch.hint || '';
      document.getElementById('f-hint-penalty').value     = ch.hintPenalty || 10;
      document.getElementById('f-learned').value          = ch.whatYouLearned || '';
      document.getElementById('f-defense').value          = ch.defense || '';
    }

    if (!modal) modal = new bootstrap.Modal(document.getElementById('challengeModal'));
    modal.show();
  }

  function saveChallenge() {
    const title = document.getElementById('f-title').value.trim();
    const cat   = document.getElementById('f-category').value;
    const diff  = document.getElementById('f-difficulty').value;
    const pts   = document.getElementById('f-points').value;
    const desc  = document.getElementById('f-description').value.trim();
    const flag  = document.getElementById('f-flag').value.trim();

    if (!title || !cat || !diff || !pts || !desc || !flag) {
      showAlert('Please fill in all required fields (Title, Category, Difficulty, Points, Description, Flag).', 'danger');
      return;
    }

    const data = {
      title, category: cat, difficulty: diff, points: parseInt(pts),
      description: desc, flag,
      hint:           document.getElementById('f-hint').value.trim(),
      hintPenalty:    parseInt(document.getElementById('f-hint-penalty').value) || 10,
      whatYouLearned: document.getElementById('f-learned').value.trim(),
      defense:        document.getElementById('f-defense').value.trim()
    };

    const editId = document.getElementById('edit-id').value;
    if (editId) {
      updateChallenge(parseInt(editId), data);
      showAlert(`Challenge "<strong>${data.title}</strong>" updated.`, 'success');
    } else {
      addChallenge(data);
      showAlert(`Challenge "<strong>${data.title}</strong>" added.`, 'success');
    }

    modal.hide();
    render();
  }

  // ── Actions ─────────────────────────────────────────────────────────────────

  function doToggle(id) {
    const nowVisible = toggleChallenge(id);
    showAlert(
      nowVisible ? 'Challenge is now <strong>visible</strong> to students.'
                 : 'Challenge is now <strong>hidden</strong> from students.',
      nowVisible ? 'success' : 'warning'
    );
    render();
  }

  function doDelete(id, title) {
    if (!confirm(`Permanently delete "${title}"?\nThis also removes all student solves for this challenge.`)) return;
    deleteChallenge(id);
    showAlert('Challenge deleted.', 'warning');
    render();
  }

  function confirmRestore() {
    if (!confirm('Restore all 18 default challenges?\nCustom challenges you added will be removed. Student solves are kept.')) return;
    restoreDefaultChallenges();
    showAlert('Default challenges restored!', 'success');
    render();
  }

  function confirmResetScoreboard() {
    if (!confirm('Reset ALL student scores, solves, quiz attempts, and jeopardy progress?\nThis cannot be undone.')) return;
    const users = getUsers();
    users.forEach(u => { u.totalPoints = 0; });
    saveUsers(users);
    saveSolves([]);
    saveQuizAttempts([]);
    saveJeopardyState({});
    showAlert('Scoreboard reset successfully!', 'success');
    setTimeout(render, 400);
  }

  function doDeleteUser(id, username) {
    if (!confirm(`Delete user "${username}"?\nThis also removes all their solves and quiz attempts.`)) return;
    const users = getUsers().filter(u => u.id !== id);
    saveUsers(users);
    saveSolves(getSolves().filter(s => s.userId !== id));
    saveQuizAttempts(getQuizAttempts().filter(a => a.userId !== id));
    showAlert(`User "<strong>${username}</strong>" deleted.`, 'warning');
    render();
  }

  render();
</script>
</body>
</html>
