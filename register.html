<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - UTech CTF Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="custom.css">
</head>
<body class="bg-dark text-light">
<div id="nav-placeholder"></div>
<div class="container mt-3" id="alert-container"></div>

<main class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card bg-dark border-success mt-5">
        <div class="card-body p-4">
          <h3 class="text-center text-success mb-4"><i class="bi bi-person-plus"></i> Register</h3>
          <form id="register-form">
            <div class="mb-3">
              <label class="form-label text-muted">Username</label>
              <input type="text" id="username" class="form-control bg-black text-light border-secondary" required autofocus>
            </div>
            <div class="mb-3">
              <label class="form-label text-muted">Email</label>
              <input type="email" id="email" class="form-control bg-black text-light border-secondary" required>
            </div>
            <div class="mb-3">
              <label class="form-label text-muted">Password</label>
              <input type="password" id="password" class="form-control bg-black text-light border-secondary" required minlength="6">
            </div>
            <button type="submit" class="btn btn-success w-100">Create Account</button>
          </form>
          <hr class="border-secondary">
          <p class="text-center text-muted mb-0">Already have an account? <a href="login.html" class="text-success">Login</a></p>
        </div>
      </div>
    </div>
  </div>
</main>

<footer class="bg-black text-center py-3 border-top border-success mt-auto">
  <p class="text-muted mb-0"><i class="bi bi-shield-lock"></i> UTech CTF Hub | CNS3005 Ethical Hacking | <span class="text-success">&copy; 2026</span></p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="data.js"></script>
<script src="auth.js"></script>
<script src="app.js"></script>
<script>
  initPage();
  if (getSession()) window.location.href = 'index.html';

  document.getElementById('register-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const result = await registerUser(username, email, password);
    if (result.success) {
      showAlert('Registration successful! Please log in.', 'success');
      setTimeout(() => window.location.href = 'login.html', 1500);
    } else {
      showAlert(result.error, 'danger');
    }
  });
</script>
</body>
</html>
