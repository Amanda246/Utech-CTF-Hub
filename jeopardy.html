<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeopardy - UTech CTF Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-dark text-light">
<div id="nav-placeholder"></div>
<div class="container mt-3" id="alert-container"></div>

<main class="container py-4">
  <h2 class="mb-4"><i class="bi bi-grid-3x3"></i> Jeopardy Board</h2>
  <div id="jeopardy-board"></div>
</main>

<!-- Question Modal -->
<div class="modal fade" id="qModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark border-primary">
      <div class="modal-header border-secondary">
        <h5 class="modal-title text-warning" id="modalPts"></h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p class="text-light fs-5" id="modalQuestion"></p>
        <div class="mt-3">
          <label class="form-label text-muted small">Your Answer</label>
          <input type="text" class="form-control bg-dark text-light border-secondary"
                 id="answerInput" placeholder="Type your answer here..." autocomplete="off">
        </div>
      </div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-success" onclick="submitJeopardy()">
          <i class="bi bi-check-lg"></i> Submit Answer
        </button>
      </div>
    </div>
  </div>
</div>

<footer class="bg-black text-center py-3 border-top border-success mt-auto">
  <p class="text-muted mb-0"><i class="bi bi-shield-lock"></i> UTech CTF Hub | CNS3005 Ethical Hacking | <span class="text-success">&copy; 2026</span></p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
  initPage();
  if (!requireLogin()) { throw new Error('Not logged in — redirecting'); }

  let currentQuestionId = null;
  const jeopardyState = getJeopardyState();

  function renderBoard() {
    const board = document.getElementById('jeopardy-board');
    board.innerHTML = `
      <div class="table-responsive">
        <table class="table table-bordered text-center" style="background:#001a66;">
          <thead>
            <tr>
              ${JEOPARDY_CATEGORIES.map(cat => `<th class="text-white" style="background:#001a66;">${cat}</th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${JEOPARDY_POINTS.map(pts => `
              <tr>
                ${JEOPARDY_CATEGORIES.map(cat => {
                  const q = JEOPARDY_QUESTIONS.find(q => q.category === cat && q.points === pts);
                  if (!q) return '<td class="bg-secondary"></td>';
                  const answered = !!jeopardyState[q.id];
                  return `<td style="padding:0;">
                    <button class="btn w-100 h-100 py-4 fs-4 fw-bold ${answered ? 'btn-secondary' : 'btn-primary'}"
                      ${answered ? 'disabled' : `onclick="openQuestion(${q.id})"`}>
                      $${pts}
                    </button>
                  </td>`;
                }).join('')}
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  function openQuestion(id) {
    const q = JEOPARDY_QUESTIONS.find(q => q.id === id);
    if (!q) return;
    currentQuestionId = id;
    document.getElementById('modalPts').textContent = '$' + q.points;
    document.getElementById('modalQuestion').textContent = q.question;
    document.getElementById('answerInput').value = '';
    new bootstrap.Modal(document.getElementById('qModal')).show();
  }

  function submitJeopardy() {
    if (!currentQuestionId) return;
    const q = JEOPARDY_QUESTIONS.find(q => q.id === currentQuestionId);
    if (!q) return;

    const submitted = document.getElementById('answerInput').value.trim().toLowerCase();
    const correct = q.answer.toLowerCase();

    bootstrap.Modal.getInstance(document.getElementById('qModal')).hide();

    if (submitted === correct || correct.includes(submitted) || submitted.includes(correct.split(' ')[0])) {
      const session = getSession();
      jeopardyState[q.id] = true;
      saveJeopardyState(jeopardyState);
      updateUserPoints(session.userId, q.points);
      renderBoard();
      renderNav(); // update points in nav
      showAlert(`Correct! +${q.points} points! Answer: ${q.answer}`, 'success');
    } else {
      showAlert(`Incorrect. The answer was: <strong>${q.answer}</strong>`, 'danger');
    }
  }

  // Allow Enter key in answer input
  document.getElementById('answerInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') submitJeopardy();
  });

  renderBoard();
</script>
</body>
</html>
