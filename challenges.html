<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Challenges - UTech CTF Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-dark text-light">
<div id="nav-placeholder"></div>
<div class="container mt-3" id="alert-container"></div>

<main class="container py-4">
  <div class="row">
    <!-- Sidebar -->
    <div class="col-md-3 mb-4">
      <div class="card bg-dark border-secondary">
        <div class="card-body">
          <h6 class="text-muted text-uppercase">Filter</h6>
          <hr class="border-secondary">
          <label class="form-label text-muted small">Category</label>
          <select id="category-filter" class="form-select bg-black text-light border-secondary mb-3" onchange="renderChallenges()">
            <option value="">All Categories</option>
            <option>Cryptography</option>
            <option>Web Hacking</option>
            <option>Social Engineering</option>
            <option>Data Security</option>
            <option>Network Security</option>
            <option>Reverse Engineering</option>
          </select>
          <label class="form-label text-muted small">Difficulty</label>
          <select id="difficulty-filter" class="form-select bg-black text-light border-secondary" onchange="renderChallenges()">
            <option value="">All Difficulties</option>
            <option>Beginner</option>
            <option>Intermediate</option>
            <option>Advanced</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Challenge Grid -->
    <div class="col-md-9">
      <h2 class="mb-3"><i class="bi bi-flag"></i> Challenges <span class="badge bg-secondary ms-2" id="count-badge">0</span></h2>
      <div class="row" id="challenges-grid"></div>
    </div>
  </div>
</main>

<footer class="bg-black text-center py-3 border-top border-success mt-auto">
  <p class="text-muted mb-0"><i class="bi bi-shield-lock"></i> UTech CTF Hub | CNS3005 Ethical Hacking | <span class="text-success">&copy; 2026</span></p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
  initPage();

  // Apply URL params to filters
  const urlCat = getQueryParam('category');
  const urlDiff = getQueryParam('difficulty');
  if (urlCat) document.getElementById('category-filter').value = urlCat;
  if (urlDiff) document.getElementById('difficulty-filter').value = urlDiff;

  function renderChallenges() {
    const cat = document.getElementById('category-filter').value;
    const diff = document.getElementById('difficulty-filter').value;
    const session = getSession();
    const solved = session ? getUserSolvedChallengeIds(session.userId) : [];

    let filtered = getChallenges().filter(c => {
      if (c.isEnabled === false) return false;
      if (cat && c.category !== cat) return false;
      if (diff && c.difficulty !== diff) return false;
      return true;
    });

    document.getElementById('count-badge').textContent = filtered.length;

    const grid = document.getElementById('challenges-grid');
    if (filtered.length === 0) {
      grid.innerHTML = '<div class="col-12"><div class="alert alert-secondary">No challenges match your filters.</div></div>';
      return;
    }

    grid.innerHTML = filtered.map(ch => {
      const isSolved = solved.includes(ch.id);
      const solvedBadge = isSolved ? '<span class="badge bg-success ms-1"><i class="bi bi-check"></i> Solved</span>' : '';
      const desc = ch.description.replace(/<[^>]+>/g, '').substring(0, 80) + '...';
      const btn = session
        ? `<a href="challenge.html?slug=${ch.slug}" class="btn btn-outline-success btn-sm">Solve &rarr;</a>`
        : `<a href="login.html" class="btn btn-outline-secondary btn-sm">Login to Solve</a>`;
      return `
        <div class="col-md-6 mb-4">
          <div class="card challenge-card h-100 ${isSolved ? 'border-success' : ''}">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-start">
                <h6 class="text-light mb-1">${ch.title}${solvedBadge}</h6>
                <span class="badge bg-success">${ch.points} pts</span>
              </div>
              <div class="mb-2">
                <span class="badge bg-info text-dark">${ch.category}</span>
                ${difficultyBadge(ch.difficulty)}
              </div>
              <p class="text-muted small">${desc}</p>
              ${btn}
            </div>
          </div>
        </div>`;
    }).join('');
  }

  renderChallenges();
</script>
</body>
</html>
